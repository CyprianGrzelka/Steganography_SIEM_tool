input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Jeśli event pochodzi z modułu detekcji steganografii
  if [source] == "stego_detector" {
    mutate {
      add_tag => ["steganography_alert"]
      add_field => { "[@metadata][index]" => "stego-alerts" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][index]" => "stego-events" }
    }
  }

  # Timestamp normalizacja
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][index]}-%{+YYYY.MM.dd}"
  }

  # Debug — widać eventy w logach Logstash
  stdout {
    codec => rubydebug
  }
}
